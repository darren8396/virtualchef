[server]
# Note: port/address are intentionally unset so Streamlit Community Cloud
# can use its default port 8501. Cloud Run deployment overrides these via
# the Dockerfile CMD (--server.port=$PORT --server.address=0.0.0.0).
headless = true
enableCORS = false
enableXsrfProtection = false

# Performance settings
maxUploadSize = 5
maxMessageSize = 50

[browser]
# Disable usage statistics
gatherUsageStats = false

[theme]
# Optional: Custom theme for VirtualChef
primaryColor = "#FF6B6B"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F0F2F6"
textColor = "#262730"
font = "sans serif"

[logger]
# Logging level
level = "info"
